<!DOCTYPE html>
<html lang="zh-MO" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="澳視天下">
    <meta name="theme-color" content="#022c22">
    <title>澳視天下 - AI Beta版</title>
    
    <!-- 引入 Tailwind CSS, FontAwesome 圖片庫, 與 SortableJS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        macau: { 50: '#f0fdf6', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#007A5E', 800: '#065f46', 900: '#022c22' }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
